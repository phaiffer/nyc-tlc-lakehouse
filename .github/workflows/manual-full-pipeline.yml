name: Manual - Full Local Pipeline

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Dataset year"
        required: true
        default: "2024"
      month:
        description: "Dataset month"
        required: true
        default: "1"

jobs:
  full-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download input parquet
        run: |
          python orchestration/local/run_pipeline.py download --year "${{ inputs.year }}" --month "${{ inputs.month }}"

      - name: Run full pipeline
        run: |
          python orchestration/local/run_pipeline.py reset
          python orchestration/local/run_pipeline.py run-all --year "${{ inputs.year }}" --month "${{ inputs.month }}"
          python orchestration/local/run_pipeline.py inspect
