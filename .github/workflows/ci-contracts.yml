name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          make lint

      - name: Format check (ruff)
        run: |
          python -m ruff format --check .

      - name: Unit and integration tests
        run: |
          make test

      - name: Validate contracts
        run: |
          python ci/scripts/validate_contracts.py

      - name: Smoke
        run: |
          make smoke

      - name: Fetch base branch history
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune --depth=0 origin +refs/heads/*:refs/remotes/origin/*

      - name: Detect contract breaking changes
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.sha }}
        run: |
          python ci/scripts/detect_contract_breaking_changes.py
