name: CI Quality Gates

on:
  pull_request:
  push:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Format check (ruff)
        run: |
          python -m ruff format --check .

      - name: Lint (ruff)
        run: |
          python -m ruff check .

      - name: Compile all Python files
        run: |
          python -m compileall .

      - name: Unit and integration tests
        run: |
          python -m pytest -q

      - name: Pipeline smoke (strict mode, local fixture)
        run: |
          python -m pytest -q tests/integration/test_pipeline_smoke_wiring.py

      - name: Validate contracts
        run: |
          python ci/scripts/validate_contracts.py

      - name: Smoke
        run: |
          make smoke

      - name: Fetch base branch history
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune --depth=0 origin +refs/heads/*:refs/remotes/origin/*

      - name: Detect contract breaking changes
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.sha }}
        run: |
          python ci/scripts/detect_contract_breaking_changes.py
