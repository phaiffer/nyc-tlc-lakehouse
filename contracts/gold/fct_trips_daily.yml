dataset: gold.fct_trips_daily
owner: analytics-engineering
version: 2

primary_key: [trip_date, vendor_id]
watermark: trip_date
late_arrival_days: 7

schema:
  - name: trip_date
    type: date
    nullable: false
  - name: vendor_id
    type: string
    nullable: false
  - name: trips
    type: bigint
    nullable: false
  - name: total_fare
    type: decimal(18,2)
    nullable: false

expectations:
  - name: required_not_null
    type: not_null
    columns: [trip_date, vendor_id, trips, total_fare]
  - name: pk_unique
    type: unique
    columns: [trip_date, vendor_id]
  - name: trips_non_negative
    type: range
    column: trips
    min: 0
  - name: fare_non_negative
    type: range
    column: total_fare
    min: 0
