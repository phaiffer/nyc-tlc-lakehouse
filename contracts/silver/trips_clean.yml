dataset: silver.trips_clean
owner: data-platform
version: 2

primary_key: [trip_id]
watermark: updated_at
late_arrival_days: 7

schema:
  - name: trip_id
    type: string
    nullable: false
  - name: vendor_id
    type: string
    nullable: true
  - name: pickup_ts
    type: timestamp
    nullable: false
  - name: dropoff_ts
    type: timestamp
    nullable: false
  - name: pickup_date
    type: date
    nullable: false
  - name: trip_distance
    type: double
    nullable: false
  - name: updated_at
    type: timestamp
    nullable: false
  - name: fare_amount
    type: decimal(18,2)
    nullable: false
  - name: passenger_count
    type: bigint
    nullable: true

expectations:
  - name: required_not_null
    rule_id: SLV001
    severity: error
    type: not_null
    columns: [trip_id, pickup_ts, dropoff_ts, pickup_date, updated_at]
  - name: pk_unique
    rule_id: SLV002
    severity: error
    type: unique
    columns: [trip_id]
  - name: fare_non_negative
    rule_id: SLV003
    severity: error
    type: range
    column: fare_amount
    min: 0
  - name: trip_distance_non_negative
    rule_id: SLV004
    severity: error
    type: range
    column: trip_distance
    min: 0
  - name: invalid_pickup_date_window
    rule_id: QG001
    severity: error
    type: quality_gate
  - name: non_positive_trip_duration
    rule_id: QG002
    severity: error
    type: quality_gate
  - name: negative_fare_or_distance
    rule_id: QG003
    severity: error
    type: quality_gate
  - name: pk_duplicates_detected
    rule_id: QG004
    severity: warn
    type: quality_gate
  - name: gold_non_positive_volume
    rule_id: QG005
    severity: error
    type: quality_gate
  - name: gold_avg_fare_per_trip_out_of_range
    rule_id: QG006
    severity: error
    type: quality_gate
